<?xml version="1.0" encoding="UTF-8"?>
<!--
  Calculator app logo (master) - "CA" badge variant.

  Composition (1024 canvas):
   - Solid forest-green disk at #1B5E20 with a thin white ring just
     inside the edge.
   - A white rounded-rectangle "calculator" body in the upper-left
     half. Body is split into a 2x2 grid by green dividers and
     shows the operators +, -, x in three quadrants. The fourth
     (bottom-right) quadrant is hidden by the badge below.
   - A round "CA" badge bottom-right: white disk with a thick green
     ring border, "CA" lettering in stroked green paths centred
     inside.

  The lettering is rendered as path strokes rather than <text>
  elements so the SVG renders identically across every backend
  (ImageMagick, browsers, librsvg) - no need for the renderer to
  have any specific font installed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <!-- Background disk + thin white ring. -->
    <circle cx="512" cy="512" r="500" fill="#1B5E20"/>
    <circle cx="512" cy="512" r="465" fill="none" stroke="#FFFFFF" stroke-width="10"/>

    <!-- Calculator body: white rounded rectangle. -->
    <g transform="translate(208 212)">
        <rect width="500" height="560" rx="40" ry="40" fill="#FFFFFF"/>

        <!-- Green dividers carving the body into a 2x2 grid. Reach the
             body edges so each quadrant is a fully-bounded rectangle
             and every operator reads as centred in its cell. -->
        <line x1="250" y1="0" x2="250" y2="560" stroke="#1B5E20" stroke-width="18"/>
        <line x1="0" y1="280" x2="500" y2="280" stroke="#1B5E20" stroke-width="18"/>

        <!-- Top-left: PLUS at quadrant centre (125, 140). -->
        <g transform="translate(125 140)" stroke="#1B5E20" stroke-width="32" stroke-linecap="round">
            <line x1="-55" y1="0" x2="55" y2="0"/>
            <line x1="0" y1="-55" x2="0" y2="55"/>
        </g>

        <!-- Top-right: MINUS at quadrant centre (375, 140). -->
        <g transform="translate(375 140)" stroke="#1B5E20" stroke-width="32" stroke-linecap="round">
            <line x1="-55" y1="0" x2="55" y2="0"/>
        </g>

        <!-- Bottom-left: TIMES at quadrant centre (125, 400). -->
        <g transform="translate(125 400) rotate(45)" stroke="#1B5E20" stroke-width="32" stroke-linecap="round">
            <line x1="-55" y1="0" x2="55" y2="0"/>
            <line x1="0" y1="-55" x2="0" y2="55"/>
        </g>
    </g>

    <!-- "CA" badge: white disk with thick green ring. -->
    <circle cx="668" cy="668" r="172" fill="#FFFFFF" stroke="#1B5E20" stroke-width="18"/>

    <!-- "CA" lettering, stroked paths in green.
         C: open arc on the right side of (618, 668).
         A: two diagonal strokes meeting at apex (718, 588), feet at
            (676, 748) and (760, 748); crossbar at y=708. -->
    <g stroke="#1B5E20" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <!-- C -->
        <path d="M 668,610 A 58,58 0 1 0 668,726"/>
        <!-- A: triangle outline open at the bottom -->
        <path d="M 690,742 L 728,594 L 766,742"/>
        <!-- A: crossbar -->
        <path d="M 703,690 L 753,690"/>
    </g>
</svg>
