name: Bug report
description: Report something that is broken or behaves unexpectedly
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details
        below so we can reproduce it quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I tap `=` after `5÷0` the app shows a blank screen instead of an error.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal numbered steps that reliably reproduce the bug.
      placeholder: |
        1. Open the basic calculator
        2. Type `5`, `÷`, `0`, `=`
        3. Observe the display
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to see instead?
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → About → Version
      placeholder: 0.1.0 (1)
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and OS
      placeholder: Pixel 6a, Android 14
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Anything else that helps - logcat snippets, screenshots, screen recordings.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
