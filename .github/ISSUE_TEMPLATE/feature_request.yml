name: Feature request
description: Suggest a new calculator, converter, or workflow
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check the
        [REQUIREMENTS.md](../REQUIREMENTS.md) scope before filing - features
        already on the roadmap may have an existing issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or the gap in the current app.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the app do? Mockups or rough UI sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other workarounds, similar features in other apps, etc.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
