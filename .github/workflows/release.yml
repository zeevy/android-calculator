# Release workflow.
#
# Triggered manually or by pushing a tag like `v0.1.0`. Split into two
# connected jobs so the Actions UI renders the pipeline as a DAG:
#
#   build-artifacts  ──>  publish-release
#
# 1. `build-artifacts` assembles the release APK + AAB and uploads them.
# 2. `publish-release` downloads the APK + AAB and attaches them to a
#    GitHub release. Only runs for tag pushes.
#
# Signing is intentionally left unsigned for now; once Play App Signing
# is enrolled the release config will pull the keystore from encrypted
# secrets and produce a signed AAB.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name to publish (e.g. v0.1.0)
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Bundle release AAB
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: calculator-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: calculator-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-artifacts
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.build-artifacts.result == 'success' }}

    steps:
      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: calculator-apk
          path: artifacts/apk

      - name: Download AAB
        uses: actions/download-artifact@v8
        with:
          name: calculator-aab
          path: artifacts/aab

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab
