# Regenerates the baseline profile on every push to `main` and uploads
# the resulting `baseline-prof.txt` as a build artifact. The job runs on
# a Linux runner with hardware acceleration (`runs-on: ubuntu-latest`
# + KVM via reactivecircus/android-emulator-runner) so the Macrobenchmark
# rule's strict-mode environment is satisfied.
#
# Kept in its own workflow because emulator boot + Macrobenchmark runs
# take ~10-15 min; we don't want every PR to wait that long.

name: Baseline Profile

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate baseline profile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel6-api34-v2

      - name: Create AVD and prime cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: aosp_atd
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot."

      - name: Generate baseline profile + run startup benchmark
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: aosp_atd
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Generate the profile, then run the Macrobenchmark startup
          # benchmarks. The startup test produces a benchmarkData.json
          # which the regression gate below reads.
          script: |
            ./gradlew :app:generateReleaseBaselineProfile --stacktrace
            ./gradlew :baselineprofile:connectedBenchmarkAndroidTest --stacktrace

      - name: Gate cold-start regression at 10%
        # Compares the measured cold-start P50 (Partial+BaselineProfile
        # compilation row) against the committed baseline at
        # baselineprofile/baseline-startup.json. Fails the workflow if
        # the new run is more than 10 percent slower. Update the JSON
        # when a regression is intentional (e.g. shipping a heavier
        # feature) and call it out in the PR description.
        run: ./baselineprofile/scripts/check-startup-regression.sh

      - name: Upload generated profile
        uses: actions/upload-artifact@v5
        with:
          name: baseline-prof
          path: app/src/main/baseline-prof.txt
          retention-days: 30

      - name: Upload macrobenchmark data
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-data
          # Macrobenchmark writes one JSON per device under
          # connected_android_test_additional_output - glob it so we
          # capture whatever the emulator-runner names the AVD.
          path: baselineprofile/build/outputs/**/*benchmarkData.json
          retention-days: 30
